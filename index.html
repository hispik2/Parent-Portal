<title>HIS Parents Portal</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* BACKGROUND */
body {
    background: url('background.jpg') no-repeat center center fixed;
    background-size: cover;
    position: relative;
}

/* OVERLAY */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(
        to right,
        rgba(0,0,0,0.6) 0%,
        rgba(0,0,0,0.4) 35%,
        rgba(0,0,0,0.2) 60%,
        rgba(0,0,0,0) 85%
    );
    z-index: -1;
}

/* TITLE (lebih rapat & stabil) */
.title {
    text-align: center;
    margin-top: 40px;
    margin-bottom: 20px; /* 🔥 jarak ke tombol */
}

.title h1 {
    display: inline-block;
    background: rgba(0,0,0,0.55);
    padding: 10px 25px;
    border-radius: 8px;
    font-size: 36px;
    color: #fbbf24;
    letter-spacing: 2px;
}

/* CONTAINER */
.container {
    display: flex;
    justify-content: center;
    padding: 10px 20px 40px; /* 🔥 jarak atas kecil */
}

/* GRID 6 KOLOM */
.button-group {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 20px;
    width: 95%;
    max-width: 1300px;
}

/* BUTTON */
.btn {
    padding: 14px 10px;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 18px rgba(0,0,0,0.4);
}

/* RESPONSIVE */
@media (max-width: 1024px) {
    .button-group {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media (max-width: 600px) {
    .button-group {
        grid-template-columns: repeat(1, 1fr);
    }

    .title h1 {
        font-size: 24px;
    }
}
</style>
</head>
